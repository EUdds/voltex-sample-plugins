name: Build plugins

on:
  push:
    branches: [master]
    paths:
      - 'plugins/*/src/**'
      - 'build.mjs'
      - 'package.json'
      - 'package-lock.json'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - run: npm ci

      - run: npm run build

      - name: Inject integrity hashes into voltex-registry.json
        run: |
          node -e "
          const { createHash } = require('crypto');
          const { readFileSync, writeFileSync, existsSync } = require('fs');

          const registry = JSON.parse(readFileSync('voltex-registry.json', 'utf8'));

          for (const plugin of registry.plugins) {
            const mainFile = plugin.main ?? 'dist/index.js';
            const filePath = \`\${plugin.path}/\${mainFile}\`;
            if (existsSync(filePath)) {
              // Read as UTF-8 text and re-encode — matches Voltex TextEncoder hashing
              const content = readFileSync(filePath, 'utf8');
              const bytes = Buffer.from(content, 'utf8');
              const hash = createHash('sha256').update(bytes).digest('base64');
              plugin.integrity = \`sha256-\${hash}\`;
              console.log(\`\${plugin.path}: sha256-\${hash}\`);
            }
          }

          writeFileSync('voltex-registry.json', JSON.stringify(registry, null, 4) + '\n');
          "

      - name: Commit built files and updated registry
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add plugins/*/dist/index.js voltex-registry.json
          git diff --staged --quiet || git commit -m "chore: build plugins and update integrity hashes [skip ci]"
          git push
